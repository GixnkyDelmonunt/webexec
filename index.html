<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP.GG</title>

<!-- ACE EDITOR LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>

<style>
:root { --bg-opacity: 1; --main-bg: rgba(30, 30, 30, var(--bg-opacity)); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Consolas, monospace; background:#000; color:white; overflow:hidden; }

#executor {
  position:fixed; top:0; left:0;
  width:100vw; height:100vh;
  background: var(--main-bg); border:1px solid #333;
  display:flex; flex-direction:column;
  z-index: 1;
  transition: all 0.4s cubic-bezier(0.075, 0.82, 0.165, 1);
}

#executor.dragging { transition: none !important; }

#executor.small-window {
    top: 50px; left: 50px;
    width: 950px; height: 550px;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.titlebar {
  background: rgba(17, 17, 17, 0.9); padding:10px 15px; font-weight:bold;
  display:flex; justify-content:space-between; 
  cursor: default; align-items: center; user-select: none;
}

.tabs {
  background: rgba(45, 45, 45, 0.8);
  display:flex; gap:2px; padding:5px 5px 0 5px; overflow-x:auto;
}

.tab {
  padding:6px 12px; background:#3c3c3c; border-radius:5px 5px 0 0;
  cursor:pointer; display:flex; align-items:center; font-size: 12px;
  border-right: 1px solid #2d2d2d; transition: background 0.2s;
}
.tab.active { background:#3a86ff; }
.tab:hover:not(.active) { background: #4a4a4a; }

/* Context Menu */
#tabContextMenu {
    position: fixed; background: #252525; border: 1px solid #444;
    z-index: 10000; display: none; flex-direction: column;
    padding: 5px 0; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}
.ctx-item {
    padding: 8px 15px; font-size: 12px; cursor: pointer; color: #ccc;
}
.ctx-item:hover { background: #3a86ff; color: white; }

.main { display:flex; flex:1; position: relative; overflow: hidden; }

/* Settings View Updates */
#settingsView {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #1e1e1e; z-index: 10; display: none;
  flex-direction: column; padding: 30px 40px; overflow-y: auto;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.setting-row { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
.setting-row label { font-size: 13px; color: #ccc; width: 150px; }

.left { flex:1; display:flex; flex-direction:column; overflow: hidden; }

.editor-container { flex: 1; display: flex; position: relative; }
#editorBox { flex:1; width: 100%; height: 100%; }

/* Script Hub Sidebar */
.sidebar { width:220px; background: rgba(45, 45, 45, 0.5); padding:10px; display: flex; flex-direction: column; gap: 10px; border-left: 1px solid #333; }
.hub-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.script-list { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }
.script-item {
    background: #333; padding: 8px; border-radius: 4px; font-size: 12px;
    cursor: pointer; transition: 0.2s; border-left: 3px solid transparent;
}
.script-item:hover { background: #444; border-left-color: #3a86ff; }

.output {
  height:100px; overflow:auto; padding:10px; font-size:12px;
  background: rgba(20, 20, 20, 0.8); border-top:1px solid #333;
  white-space:pre-wrap; color: #bbb;
}

/* Modal and Transitions */
#closeOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); z-index: 10000; display: none;
    align-items: center; justify-content: center;
}

/* Reuse existing button styles... */
.action-btn { background: #3c3c3c; border: none; color: white; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
.primary-btn { background: #3a86ff; }

</style>
</head>
<body>

<div id="notification-container"></div>

<div id="tabContextMenu">
    <div class="ctx-item" onclick="duplicateCurrentTab()">Duplicate</div>
    <div class="ctx-item" onclick="closeOtherTabs()">Close Others</div>
    <div class="ctx-item" onclick="closeAllTabs()">Close All</div>
</div>

<div id="closeOverlay">
    <div class="close-modal">
        <h2 style="color:white; margin-bottom:10px">Close AWP.GG?</h2>
        <div class="modal-btns" style="display:flex; gap:10px;">
            <button class="action-btn primary-btn" onclick="window.close()">Close</button>
            <button class="action-btn" onclick="document.getElementById('closeOverlay').style.display='none'">Cancel</button>
        </div>
    </div>
</div>

<div id="executor">
  <div class="titlebar" id="dragBar">
    <div class="title-left">
        <span>AWP.GG</span>
        <span class="settings-toggle" id="settingsBtn" style="cursor:pointer; margin-left:10px">⚙</span>
    </div>
    <div class="window-controls">
        <span class="win-btn" id="minBtn">─</span>
        <span class="win-btn" id="sizeBtn">❐</span>
        <span class="win-btn" id="closeBtn">✕</span>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="main" id="mainWindow">
    <div id="settingsView">
        <h2 class="settings-header">Settings & Customization</h2>
        <p class="settings-sub">Configure your workspace</p>
        
        <div class="step-label">Appearance</div>
        <div class="generator-section">
            <div class="setting-row">
                <label>Editor Theme</label>
                <select id="themeSelect" class="clean-input" style="width:200px">
                    <option value="ace/theme/monokai">Monokai (Default)</option>
                    <option value="ace/theme/dracula">Dracula</option>
                    <option value="ace/theme/nord_dark">Nord</option>
                    <option value="ace/theme/tomorrow_night">Tomorrow Night</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Font Family</label>
                <select id="fontSelect" class="clean-input" style="width:200px">
                    <option value="'Consolas', monospace">Consolas</option>
                    <option value="'Fira Code', monospace">Fira Code</option>
                    <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Font Size</label>
                <input type="number" id="fontSizeInput" class="clean-input" value="14" style="width:80px">
            </div>
            <div class="setting-row">
                <label>Transparency</label>
                <input type="range" id="transparencySlider" min="0.1" max="1" step="0.05" value="1">
            </div>
        </div>

        <!-- Keep previous ID generation sections here -->
        <div class="step-label">Device Link</div>
        <div class="generator-section">
            <input type="text" id="scriptIdInput" class="clean-input" placeholder="Script ID...">
        </div>
    </div>

    <div class="left">
      <div class="editor-container" id="dropZone">
        <div id="editorBox"></div>
      </div>
      <div class="controls">
        <button id="executeBtn">Execute</button>
        <button id="clearBtn">Clear</button>
        <button id="saveBtn">Save</button>
        <button id="newTabBtn">+ Tab</button>
      </div>
      <div id="output" class="output"></div>
    </div>

    <div class="sidebar">
      <div class="hub-title">Script Hub</div>
      <div class="script-list" id="scriptHub">
          <!-- Populated by JS -->
      </div>
    </div>
  </div>
</div>

<script>
/* ---------- INITIALIZATION & CONFIG ---------- */
const editor = ace.edit("editorBox");
editor.setTheme("ace/theme/monokai");
editor.session.setMode("ace/mode/lua");

const cloudScripts = [
    { name: "Infinite Yield", code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source"))()' },
    { name: "Dex Explorer", code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/infyiff/backup/main/dex.lua"))()' },
    { name: "Remote Spy", code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/exxtremestuffs/SimpleSpySource/master/SimpleSpy.lua"))()' },
    { name: "Domain X", code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/shlexware/DomainX/main/source",true))()' }
];

/* ---------- CONSOLE COLORING ---------- */
const output = document.getElementById("output");
function log(msg){
  const t = new Date().toLocaleTimeString('en-US',{hour12:false});
  let color = "#bbb";
  if(msg.toLowerCase().includes("error") || msg.toLowerCase().includes("failed")) color = "#ff4d4d";
  if(msg.toLowerCase().includes("success")) color = "#4dff4d";
  
  output.innerHTML += `[${t}] <span style="color:${color}">${msg}</span>\n`;
  output.scrollTop = output.scrollHeight;
}

/* ---------- SETTINGS LOGIC ---------- */
document.getElementById("themeSelect").onchange = (e) => editor.setTheme(e.target.value);
document.getElementById("fontSelect").onchange = (e) => editor.setOptions({ fontFamily: e.target.value });
document.getElementById("fontSizeInput").onchange = (e) => editor.setFontSize(parseInt(e.target.value));
document.getElementById("transparencySlider").oninput = (e) => {
    document.documentElement.style.setProperty('--bg-opacity', e.target.value);
};

/* ---------- TAB SYSTEM (REORDER & CTX) ---------- */
const tabsContainer = document.getElementById("tabs");
let tabsData = {};
let currentTab = null;
let tabCount = 0;
let draggedTab = null;

function createTab(name="Untitled", code="-- New Script\n"){
  tabCount++;
  const id="tab"+tabCount;
  tabsData[id]=code;
  const tab=document.createElement("div");
  tab.className="tab";
  tab.dataset.tab=id;
  tab.draggable = true;
  tab.innerHTML = `<span class="tab-name">${name}</span>`;
  
  tab.onclick = () => switchTab(id, tab);
  tab.oncontextmenu = (e) => {
      e.preventDefault();
      currentTab = id;
      const menu = document.getElementById("tabContextMenu");
      menu.style.display = "flex";
      menu.style.left = e.pageX + "px";
      menu.style.top = e.pageY + "px";
  };

  // Drag Reordering
  tab.ondragstart = () => { draggedTab = tab; tab.style.opacity = "0.5"; };
  tab.ondragend = () => { draggedTab = null; tab.style.opacity = "1"; };
  tab.ondragover = (e) => e.preventDefault();
  tab.ondrop = () => {
      if (draggedTab !== tab) {
          let children = Array.from(tabsContainer.children);
          if (children.indexOf(draggedTab) < children.indexOf(tab)) tabsContainer.insertBefore(draggedTab, tab.nextSibling);
          else tabsContainer.insertBefore(draggedTab, tab);
      }
  };

  tabsContainer.appendChild(tab);
  switchTab(id, tab);
}

function switchTab(id, el){
  if(currentTab && tabsData[currentTab] !== undefined) tabsData[currentTab] = editor.getValue();
  currentTab=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  editor.setValue(tabsData[id] || "", -1);
}

window.onclick = () => document.getElementById("tabContextMenu").style.display = "none";

function closeOtherTabs() {
    Object.keys(tabsData).forEach(id => {
        if(id !== currentTab) {
            delete tabsData[id];
            document.querySelector(`[data-tab="${id}"]`).remove();
        }
    });
}

function closeAllTabs() {
    tabsContainer.innerHTML = "";
    tabsData = {};
    createTab();
}

function duplicateCurrentTab() {
    const name = document.querySelector(`[data-tab="${currentTab}"] .tab-name`).textContent;
    createTab(name + " Copy", editor.getValue());
}

/* ---------- FILE DROP ---------- */
const dropZone = document.getElementById("dropZone");
dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = "rgba(58, 134, 255, 0.1)"; };
dropZone.ondragleave = () => { dropZone.style.background = "transparent"; };
dropZone.ondrop = (e) => {
    e.preventDefault();
    dropZone.style.background = "transparent";
    const file = e.dataTransfer.files[0];
    if (file && (file.name.endsWith(".lua") || file.name.endsWith(".txt"))) {
        const reader = new FileReader();
        reader.onload = (ev) => createTab(file.name.replace(".lua",""), ev.target.result);
        reader.readAsText(file);
    }
};

/* ---------- SCRIPT HUB ---------- */
const hub = document.getElementById("scriptHub");
cloudScripts.forEach(s => {
    const div = document.createElement("div");
    div.className = "script-item";
    div.textContent = s.name;
    div.onclick = () => createTab(s.name, s.code);
    hub.appendChild(div);
});

/* ---------- KEYBOARD SHORTCUTS ---------- */
window.onkeydown = (e) => {
    if (e.ctrlKey) {
        if (e.key === "Enter") { e.preventDefault(); document.getElementById("executeBtn").click(); }
        if (e.key === "s") { e.preventDefault(); document.getElementById("saveBtn").click(); }
        if (e.key === "t") { e.preventDefault(); createTab(); }
        if (e.key === "w") { 
            e.preventDefault(); 
            const el = document.querySelector(`[data-tab="${currentTab}"]`);
            if (Object.keys(tabsData).length > 1) {
                delete tabsData[currentTab];
                el.remove();
                const next = tabsContainer.querySelector(".tab");
                switchTab(next.dataset.tab, next);
            }
        }
    }
};

/* ---------- WINDOW LOGIC ---------- */
const executor = document.getElementById("executor");
document.getElementById("sizeBtn").onclick = () => executor.classList.toggle("small-window");
document.getElementById("closeBtn").onclick = () => document.getElementById("closeOverlay").style.display = "flex";
document.getElementById("settingsBtn").onclick = () => {
    const sv = document.getElementById("settingsView");
    sv.style.display = sv.style.display === "flex" ? "none" : "flex";
};

// Simple Drag logic
const dragBar = document.getElementById("dragBar");
let isDragging=false, oX, oY;
dragBar.onmousedown = (e) => {
    if(!executor.classList.contains("small-window")) return;
    isDragging=true; executor.classList.add("dragging");
    oX = e.clientX - executor.offsetLeft; oY = e.clientY - executor.offsetTop;
};
document.onmousemove = (e) => {
    if(isDragging) {
        executor.style.left = (e.clientX - oX) + "px";
        executor.style.top = (e.clientY - oY) + "px";
    }
};
document.onmouseup = () => { isDragging = false; executor.classList.remove("dragging"); };

// Start
createTab();
log("AWP.GG Pro Executor Initialized");
</script>
</body>
</html>
