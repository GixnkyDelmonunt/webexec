<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP.GG</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Consolas, monospace; background:#1e1e1e; color:white; overflow:hidden; }

#executor {
  position:absolute; top:50px; left:50px;
  width:950px; height:550px;
  background:#1e1e1e; border:1px solid #333;
  display:flex; flex-direction:column;
  resize:both; overflow:hidden;
}

.titlebar {
  background:#111; padding:10px 15px; font-weight:bold;
  display:flex; justify-content:space-between; cursor:move;
  align-items: center;
}

.settings-toggle {
  cursor: pointer;
  font-size: 18px;
  transition: transform 0.2s;
  user-select: none;
}
.settings-toggle:hover { transform: rotate(45deg); color: #3a86ff; }

.tabs {
  background:#2d2d2d;
  display:flex; gap:5px;
  padding:0 5px;
  overflow-x:auto;
}

.tab {
  padding:5px 10px;
  background:#3c3c3c;
  border-radius:5px 5px 0 0;
  cursor:pointer;
  display:flex; align-items:center;
}

.tab.active { background:#3a86ff; }

.tab-name { pointer-events:auto; }
.delete { margin-left:6px; cursor:pointer; }

.main { display:flex; flex:1; position: relative; overflow: hidden; }

/* Settings Page View */
#settingsView {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: #1e1e1e;
  z-index: 10;
  display: none;
  flex-direction: column;
  padding: 30px 40px;
  overflow-y: auto;
}

.settings-header { font-size: 20px; margin-bottom: 5px; color: #3a86ff; font-weight: bold; }
.settings-sub { font-size: 12px; color: #888; margin-bottom: 20px; }

.step-label {
    font-size: 14px;
    font-weight: bold;
    color: #ccc;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
}
.step-label::before {
    content: "";
    display: inline-block;
    width: 4px;
    height: 14px;
    background: #3a86ff;
    margin-right: 8px;
    border-radius: 2px;
}

.generator-section, .copy-section {
    background: #252525;
    padding: 15px;
    border-radius: 5px;
    border: 1px solid #333;
    margin-bottom: 20px;
    width: 450px;
}

.gen-controls, .copy-controls { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.gen-display { 
    background: #111; 
    padding: 8px; 
    border-radius: 4px; 
    font-weight: bold; 
    color: #3a86ff; 
    flex: 1; 
    text-align: center;
    border: 1px dashed #444;
}

.input-group { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
    width: 450px; 
}

.input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

.clean-input {
  width: 100%;
  background: #2d2d2d;
  border: 1px solid #444;
  padding: 10px 80px 10px 10px;
  color: white;
  font-family: Consolas, monospace;
  outline: none;
  border-radius: 4px;
  transition: filter 0.2s ease;
}

.blurred {
    filter: blur(5px);
    user-select: none;
    pointer-events: none; 
}

.clean-input:focus { border-color: #3a86ff; }

.toggle-btn {
    position: absolute;
    right: 5px;
    background: #3a86ff;
    border: none;
    color: white;
    padding: 4px 8px;
    font-size: 11px;
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
}

.action-btn {
    background: #3c3c3c;
    border: none;
    color: white;
    padding: 8px 15px;
    cursor: pointer;
    font-size: 12px;
    border-radius: 4px;
    transition: all 0.3s ease;
}
.action-btn:hover { background: #444; }
.primary-btn { background: #3a86ff; }
.primary-btn:hover { background: #2a76ef; }

/* GLOW EFFECT FOR STEP 3 */
.ready-glow {
    box-shadow: 0 0 15px rgba(58, 134, 255, 0.6);
    border: 1px solid #3a86ff;
    transform: scale(1.02);
}

.left { flex:1; display:flex; flex-direction:column; overflow: hidden; }

/* LINE NUMBERS STYLING */
.editor-container {
  display: flex;
  flex: 1;
  overflow: hidden;
  background: #1e1e1e;
}

#lineNumbers {
  width: 45px;
  background: #1a1a1a;
  color: #555;
  padding: 15px 10px;
  text-align: right;
  font-size: 14px;
  line-height: 1.5;
  user-select: none;
  border-right: 1px solid #333;
  overflow: hidden;
  pointer-events: none;
}

/* UPDATED EDITORBOX FOR SCROLLING */
#editorBox {
  flex:1;
  padding:15px;
  background:#1e1e1e;
  outline:none;
  overflow: auto; /* Enables scrollbars */
  white-space: pre; /* Keeps Lua formatting */
  font-size:14px;
  line-height:1.5;
  tab-size: 4;
}

/* Custom Scrollbar Styling */
#editorBox::-webkit-scrollbar { width: 10px; height: 10px; }
#editorBox::-webkit-scrollbar-track { background: #111; }
#editorBox::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
#editorBox::-webkit-scrollbar-thumb:hover { background: #3a86ff; }

.controls { display:flex; gap:8px; padding:10px; background: #1e1e1e; }

.controls button {
  background:#2d2d2d;
  border:none;
  color:white;
  padding:5px 10px;
  cursor:pointer;
}

.output {
  height:80px;
  overflow:auto;
  padding:10px;
  font-size:13px;
  background:#1e1e1e;
  border-top:1px solid #333;
  white-space:pre-wrap;
}

.sidebar {
  width:250px;
  background:#2d2d2d;
  padding:10px;
}

.search-bar input {
  width:100%;
  padding:5px;
  background:#1e1e1e;
  border:none;
  color:white;
}

</style>
</head>

<body>

<div id="executor">
  <div class="titlebar" id="dragBar">
    <span>AWP.GG</span>
    <span class="settings-toggle" id="settingsBtn">⚙</span>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="main">
    <div id="settingsView">
        <div class="settings-header">Setup Guide</div>
        <div class="settings-sub">Follow these steps to link your Roblox game to the cloud:</div>
        
        <div class="step-label">1. Generate your Unique ID</div>
        <div class="generator-section">
            <div class="gen-controls">
                <div id="genDisplay" class="gen-display">DEV-XXXXXXXXXXXXXX</div>
                <button id="genBtn" class="action-btn primary-btn">Generate</button>
                <button id="copyGenBtn" class="action-btn">Copy</button>
            </div>
        </div>

        <div class="step-label">2. Set & Lock your ID here</div>
        <div class="input-group">
            <div class="input-wrapper">
                <input type="text" id="scriptIdInput" class="clean-input" placeholder="Paste ID here to set...">
                <button id="visibilityToggle" class="toggle-btn" style="display:none;">Show</button>
            </div>
            <small id="settingHint" style="color:#888; margin-bottom: 20px;">Press Enter to save</small>
        </div>

        <div class="step-label">3. Copy the Loader Script</div>
        <div class="copy-section">
            <div class="copy-controls">
                <button id="copyBaseBtn" class="action-btn">Copy Script</button>
                <button id="copyFullBtn" class="action-btn primary-btn">Copy Script with My ID</button>
            </div>
            <small style="color:#666; display:block; margin-top:5px; font-size:11px;">Paste the script with your ID into your Roblox executor.</small>
        </div>
    </div>

    <div class="left">
      <div class="editor-container">
        <div id="lineNumbers">1</div>
        <div id="editorBox" contenteditable="true" spellcheck="false">-- Welcome to AWP.GG!</div>
      </div>

      <div class="controls">
        <button id="executeBtn">Execute</button>
        <button id="clearBtn">Clear</button>
        <button id="openBtn">Open</button>
        <button id="saveBtn">Save</button>
        <button id="newTabBtn">+ Tab</button>
      </div>

      <div id="output" class="output"></div>
    </div>

    <div class="sidebar">
      <div class="search-bar">
        <input placeholder="Search...">
      </div>
    </div>
  </div>
</div>

<script>

/* ---------- LOG SYSTEM ---------- */
const output = document.getElementById("output");

function log(msg){
  const t = new Date().toLocaleTimeString('en-US',{hour12:false});
  output.textContent += `[${t}] ${msg}\n`;
  output.scrollTop = output.scrollHeight;
}

/* ---------- LINE NUMBER LOGIC ---------- */
const lineNumbers = document.getElementById("lineNumbers");
const editorBox = document.getElementById("editorBox");

function updateLineNumbers() {
  let content = editorBox.innerText;
  
  // Browsers add a phantom \n at the end of innerText. 
  // If it ends with a newline, we slice it off to get the actual line count.
  if (content.endsWith('\n')) {
    content = content.slice(0, -1);
  }

  const lines = content.split('\n');
  const count = lines.length;
  
  let lineHtml = '';
  for (let i = 1; i <= count; i++) {
    lineHtml += i + '<br>';
  }
  lineNumbers.innerHTML = lineHtml;
}

// Sync scrolling and content
editorBox.addEventListener('scroll', () => {
  lineNumbers.scrollTop = editorBox.scrollTop;
});

editorBox.addEventListener('input', updateLineNumbers);

// Use timeout to catch the state after the Enter key has modified the DOM
editorBox.addEventListener('keydown', () => {
  setTimeout(updateLineNumbers, 0);
});

/* ---------- SETTINGS & LOGIC ---------- */
const settingsBtn = document.getElementById("settingsBtn");
const settingsView = document.getElementById("settingsView");
const scriptIdInput = document.getElementById("scriptIdInput");
const visibilityToggle = document.getElementById("visibilityToggle");
const settingHint = document.getElementById("settingHint");
const genBtn = document.getElementById("genBtn");
const copyGenBtn = document.getElementById("copyGenBtn");
const genDisplay = document.getElementById("genDisplay");

const copyBaseBtn = document.getElementById("copyBaseBtn");
const copyFullBtn = document.getElementById("copyFullBtn");

let realId = "";
let isSettingsOpen = false;
let isHidden = false;

const LUA_TEMPLATE = `local a="[[ID]]"local b="https://3ea5995c-1090-4c51-9fe6-82555a6f5b96-00-309xspfsl4afn.spock.replit.dev/api/get-code?id="..a;local c=3;local d=""local e={print=function(...)print("[AWP.GG]",...)end,warn=function(...)warn("[AWP.GG]",...)end,clear=function()print(string.rep("\\n",50))end}local f=request or http_request or syn and syn.request or fluxus and fluxus.request;print("------------------------------------------")print("AWP.GG BROWSER-SPOOF ACTIVE")print("------------------------------------------")while true do local g,h=pcall(function()return f({Url=b,Method="GET",Headers={["User-Agent"]="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",["Accept"]="*/*"}})end)if g and h and h.Body then local i=h.Body;if i~=""and i~=d and not string.find(i,"No code found")then if string.find(i,"<!DOCTYPE")or string.find(i,"<html")then warn("⚠️ [REPLIT BLOCK] Still getting the 'Wake Up' page. Try refreshing the Replit tab.")else d=i;print("✅ [SUCCESS] Cloud Script Received!")local j,k=loadstring(i)if j then setfenv(j,setmetatable(e,{__index=getfenv()}))task.spawn(j)else warn("❌ [SYNTAX ERROR] Typo in your website code: "..tostring(k))end end end else warn("⚠️ [CONNECTION ERROR] "..tostring(h))end;task.wait(c)end`;

function generateRandomString(length) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let result = "";
    for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

genBtn.onclick = () => {
    const newId = "DEV-" + generateRandomString(14);
    genDisplay.textContent = newId;
    log("Generated new ID: " + newId);
};

copyGenBtn.onclick = () => {
    const id = genDisplay.textContent;
    if(id.includes("XXXX")) return;
    navigator.clipboard.writeText(id);
    log("ID copied to clipboard!");
};

copyBaseBtn.onclick = () => {
    const script = LUA_TEMPLATE.replace("[[ID]]", "YOUR_ID_HERE");
    navigator.clipboard.writeText(script);
    log("Base script copied!");
};

copyFullBtn.onclick = () => {
    if(!realId) {
        alert("Please set a Device Script ID first!");
        return;
    }
    const script = LUA_TEMPLATE.replace("[[ID]]", realId);
    navigator.clipboard.writeText(script);
    log("Script with ID copied!");
};

settingsBtn.onclick = () => {
    isSettingsOpen = !isSettingsOpen;
    settingsView.style.display = isSettingsOpen ? "flex" : "none";
    settingsBtn.textContent = isSettingsOpen ? "✕" : "⚙";
};

function lockAndBlur() {
    const val = scriptIdInput.value.trim();
    if(val !== "" && !isHidden) {
        realId = val;
        scriptIdInput.value = generateRandomString(realId.length);
        scriptIdInput.classList.add("blurred");
        visibilityToggle.style.display = "block";
        visibilityToggle.textContent = "Show";
        settingHint.textContent = "ID Locked and Masked";
        isHidden = true;
        
        // Add Glow to Step 3
        copyFullBtn.classList.add("ready-glow");
        log("Device script id set and masked");
    }
}

visibilityToggle.onclick = () => {
    if(isHidden) {
        scriptIdInput.value = realId;
        scriptIdInput.classList.remove("blurred");
        scriptIdInput.style.pointerEvents = "auto";
        visibilityToggle.textContent = "Hide";
        isHidden = false;
        copyFullBtn.classList.remove("ready-glow");
    } else {
        lockAndBlur();
    }
};

scriptIdInput.onkeydown = e => {
    if(e.key === "Enter") {
        lockAndBlur();
        scriptIdInput.blur();
    }
};

scriptIdInput.onblur = () => {
    if(!isHidden && scriptIdInput.value.trim() !== "") {
        lockAndBlur();
    }
};

/* ---------- DRAG ---------- */
const dragBar = document.getElementById("dragBar");
const executor = document.getElementById("executor");
let drag=false, offX, offY;

dragBar.onmousedown = e=>{
  if(e.target === settingsBtn) return;
  drag=true;
  offX = e.clientX - executor.offsetLeft;
  offY = e.clientY - executor.offsetTop;
};
document.onmousemove = e=>{
  if(drag){
    executor.style.left = (e.clientX - offX)+"px";
    executor.style.top = (e.clientY - offY)+"px";
  }
};
document.onmouseup = ()=>drag=false;

/* ---------- TABS ---------- */
const tabsContainer = document.getElementById("tabs");
let tabsData = {};
let currentTab = null;
let tabCount = 0;

function getTabName(id){
  const el = tabsContainer.querySelector(`[data-tab="${id}"]`);
  return el?.querySelector(".tab-name").textContent || "script";
}

function createTab(name="Untitled"){
  tabCount++;
  const id="tab"+tabCount;
  tabsData[id]="";
  const tab=document.createElement("div");
  tab.className="tab";
  tab.dataset.tab=id;
  tab.innerHTML = `<span class="tab-name">${name}</span><span class="delete">✕</span>`;
  const nameSpan = tab.querySelector(".tab-name");
  const del = tab.querySelector(".delete");
  tab.onclick = e=>{ if(e.target!==del) switchTab(id, tab); };
  del.onclick = e=>{ e.stopPropagation(); log(`Deleted tab '${nameSpan.textContent}'`); deleteTab(id, tab); };
  nameSpan.ondblclick = ()=>{
    const old=nameSpan.textContent;
    const n=prompt("Rename tab:", old);
    if(n){ nameSpan.textContent=n; log(`Renamed '${old}' to '${n}'`); }
  };
  tabsContainer.appendChild(tab);
  switchTab(id, tab);
  tabsContainer.scrollLeft = tabsContainer.scrollWidth;
}

function switchTab(id, el){
  if(currentTab) tabsData[currentTab]=editorBox.innerText;
  currentTab=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  editorBox.innerText = tabsData[id] || "";
  updateLineNumbers();
}

function deleteTab(id, el){
  if(Object.keys(tabsData).length<=1) return;
  delete tabsData[id];
  el.remove();
  const next = tabsContainer.querySelector(".tab");
  if(next) switchTab(next.dataset.tab,next);
}

/* ---------- BUTTONS ---------- */
document.getElementById("executeBtn").onclick = async () => {
    const code = editorBox.innerText;
    const name = getTabName(currentTab);
    const API_BASE = "https://3ea5995c-1090-4c51-9fe6-82555a6f5b96-00-309xspfsl4afn.spock.replit.dev"; 

    if (!realId) {
        log("Error: Device Script ID not set in Settings.");
        return;
    }

    log(`Pushing '${name}' to Cloud...`);

    try {
        const response = await fetch(`${API_BASE}/api/update-code`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: realId, script: code })
        });

        if (response.ok) {
            log("Success: Code stored in Database.");
        } else {
            const errText = await response.text();
            log(`Server Error: ${response.status} - ${errText}`);
        }
    } catch (err) {
        log("Connection Error: Check if server is online.");
    }
};

document.getElementById("clearBtn").onclick = ()=>{
  editorBox.innerText="";
  updateLineNumbers();
  log(`Cleared '${getTabName(currentTab)}'`);
};
document.getElementById("newTabBtn").onclick = ()=>createTab();
document.getElementById("saveBtn").onclick = ()=>{
  const name = getTabName(currentTab) + ".lua";
  const blob = new Blob([editorBox.innerText]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
  log(`Saved '${name}'`);
};
document.getElementById("openBtn").onclick = ()=>{
  const input=document.createElement("input");
  input.type="file";
  input.onchange = e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload = ev=>{
      createTab(file.name.replace(/\..+/,""));
      editorBox.innerText = ev.target.result;
      updateLineNumbers();
      log(`Opened '${file.name}'`);
    };
    reader.readAsText(file);
  };
  input.click();
};

createTab();
log("Executor started");

</script>
</body>
</html>
