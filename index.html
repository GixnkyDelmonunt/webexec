<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP.GG</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Consolas, monospace; background:#1e1e1e; color:white; overflow:hidden; }

#executor {
  position:absolute; top:50px; left:50px;
  width:950px; height:550px;
  background:#1e1e1e; border:1px solid #333;
  display:flex; flex-direction:column;
  resize:both; overflow:hidden;
}

.titlebar {
  background:#111; padding:10px 15px; font-weight:bold;
  display:flex; justify-content:space-between; align-items:center;
  cursor:move;
}

.settings-btn {
  cursor:pointer;
  font-size:16px;
}

.tabs {
  background:#2d2d2d;
  display:flex; gap:5px;
  padding:0 5px;
  overflow-x:auto;
}

.tab {
  padding:5px 10px;
  background:#3c3c3c;
  border-radius:5px 5px 0 0;
  cursor:pointer;
  display:flex; align-items:center;
}

.tab.active { background:#3a86ff; }

.tab-name { pointer-events:auto; }
.delete { margin-left:6px; cursor:pointer; }

.main { display:flex; flex:1; }

.left { flex:1; display:flex; flex-direction:column; }

#editorBox {
  flex:1;
  padding:10px;
  background:#1e1e1e;
  outline:none;
  overflow:auto;
  white-space:pre;
  font-size:14px;
  line-height:1.5;
}

.controls { display:flex; gap:8px; padding:10px; }

.controls button {
  background:#2d2d2d;
  border:none;
  color:white;
  padding:5px 10px;
  cursor:pointer;
}

.output {
  height:80px;
  overflow:auto;
  padding:10px;
  font-size:13px;
  background:#1e1e1e;
  border-top:1px solid #333;
  white-space:pre-wrap;
}

.sidebar {
  width:250px;
  background:#2d2d2d;
  padding:10px;
}

.search-bar input {
  width:100%;
  padding:5px;
  background:#1e1e1e;
  border:none;
  color:white;
}

/* SETTINGS PAGE */
#settingsPage {
  display:none;
  flex:1;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:20px;
}

.settings-box {
  background:#2d2d2d;
  padding:20px;
  border-radius:8px;
  width:300px;
}

.settings-box h2 {
  margin-bottom:10px;
}

.settings-box input {
  width:100%;
  padding:8px;
  background:#1e1e1e;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div id="executor">
  <div class="titlebar" id="dragBar">
    AWP.GG
    <span class="settings-btn" id="settingsBtn">⚙️</span>
  </div>

  <div id="mainUI">
    <div class="tabs" id="tabs"></div>

    <div class="main">
      <div class="left">
        <div id="editorBox" contenteditable="true">-- Welcome to AWP.GG!</div>

        <div class="controls">
          <button id="executeBtn">Execute</button>
          <button id="clearBtn">Clear</button>
          <button id="openBtn">Open</button>
          <button id="saveBtn">Save</button>
          <button id="newTabBtn">+ Tab</button>
        </div>

        <div id="output" class="output"></div>
      </div>

      <div class="sidebar">
        <div class="search-bar">
          <input placeholder="Search...">
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS PAGE -->
  <div id="settingsPage">
    <div class="settings-box">
      <h2>Device Script ID</h2>
      <input id="deviceIdInput" placeholder="Enter ID...">
    </div>
  </div>
</div>

<script>

/* ---------- LOG SYSTEM ---------- */
const output = document.getElementById("output");

function log(msg){
  const t = new Date().toLocaleTimeString('en-US',{hour12:false});
  output.textContent += `[${t}] ${msg}\n`;
  output.scrollTop = output.scrollHeight;
}

/* ---------- SETTINGS ---------- */
const settingsBtn = document.getElementById("settingsBtn");
const settingsPage = document.getElementById("settingsPage");
const mainUI = document.getElementById("mainUI");
const deviceInput = document.getElementById("deviceIdInput");

let deviceId = "";

settingsBtn.onclick = ()=>{
  if(settingsPage.style.display === "flex"){
    settingsPage.style.display = "none";
    mainUI.style.display = "block";
  } else {
    settingsPage.style.display = "flex";
    mainUI.style.display = "none";
  }
};

function setDeviceId(val){
  if(!val) return;

  if(deviceId === ""){
    log(`Device Script ID set to '${val}'`);
  } else {
    log(`Device Script ID changed to '${val}'`);
  }

  deviceId = val;
}

// enter key
deviceInput.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    setDeviceId(deviceInput.value.trim());
    deviceInput.blur();
  }
});

// click away
deviceInput.addEventListener("blur", ()=>{
  setDeviceId(deviceInput.value.trim());
});

/* ---------- DRAG ---------- */
const dragBar = document.getElementById("dragBar");
const executor = document.getElementById("executor");

let drag=false, offX, offY;

dragBar.onmousedown = e=>{
  drag=true;
  offX = e.clientX - executor.offsetLeft;
  offY = e.clientY - executor.offsetTop;
};

document.onmousemove = e=>{
  if(drag){
    executor.style.left = (e.clientX - offX)+"px";
    executor.style.top = (e.clientY - offY)+"px";
  }
};

document.onmouseup = ()=>drag=false;

/* ---------- TABS ---------- */
const tabsContainer = document.getElementById("tabs");
const editorBox = document.getElementById("editorBox");

let tabsData = {};
let currentTab = null;
let tabCount = 0;

function getTabName(id){
  const el = tabsContainer.querySelector(`[data-tab="${id}"]`);
  return el?.querySelector(".tab-name").textContent || "script";
}

function createTab(name="Untitled"){
  tabCount++;
  const id="tab"+tabCount;
  tabsData[id]="";

  const tab=document.createElement("div");
  tab.className="tab";
  tab.dataset.tab=id;

  tab.innerHTML = `<span class="tab-name">${name}</span><span class="delete">✕</span>`;

  const nameSpan = tab.querySelector(".tab-name");
  const del = tab.querySelector(".delete");

  tab.onclick = e=>{
    if(e.target!==del) switchTab(id, tab);
  };

  del.onclick = e=>{
    e.stopPropagation();
    log(`Deleted tab '${nameSpan.textContent}'`);
    deleteTab(id, tab);
  };

  nameSpan.ondblclick = ()=>{
    const old=nameSpan.textContent;
    const n=prompt("Rename tab:", old);
    if(n){
      nameSpan.textContent=n;
      log(`Renamed '${old}' to '${n}'`);
    }
  };

  tabsContainer.appendChild(tab);
  switchTab(id, tab);
  tabsContainer.scrollLeft = tabsContainer.scrollWidth;

  log(`Created tab '${name}'`);
}

function switchTab(id, el){
  if(currentTab) tabsData[currentTab]=editorBox.innerText;
  currentTab=id;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  editorBox.innerText = tabsData[id] || "";
}

function deleteTab(id, el){
  if(Object.keys(tabsData).length<=1) return;

  delete tabsData[id];
  el.remove();

  const next = tabsContainer.querySelector(".tab");
  if(next) switchTab(next.dataset.tab,next);
}

/* ---------- BUTTONS ---------- */

document.getElementById("executeBtn").onclick = ()=>{
  const name = getTabName(currentTab);
  log(`Executed '${name}'`);
  alert("Executed!");
};

document.getElementById("clearBtn").onclick = ()=>{
  editorBox.innerText="";
  log(`Cleared '${getTabName(currentTab)}'`);
};

document.getElementById("newTabBtn").onclick = ()=>createTab();

document.getElementById("saveBtn").onclick = ()=>{
  const name = getTabName(currentTab);
  const file = name + ".lua";

  const blob = new Blob([editorBox.innerText]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=file;
  a.click();

  log(`Saved '${file}'`);
};

document.getElementById("openBtn").onclick = ()=>{
  const input=document.createElement("input");
  input.type="file";

  input.onchange = e=>{
    const file=e.target.files[0];
    if(!file) return;

    const reader=new FileReader();
    reader.onload = ev=>{
      createTab(file.name.replace(/\..+/,""));
      editorBox.innerText = ev.target.result;
      log(`Opened '${file.name}'`);
    };
    reader.readAsText(file);
  };

  input.click();
};

/* ---------- INIT ---------- */
createTab();
createTab();
createTab();

log("Executor started");

</script>
</body>
</html>
