<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP.GG</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Consolas, monospace; background:#1e1e1e; color:white; overflow:hidden; }

#executor {
  position:absolute; top:50px; left:50px;
  width:950px; height:550px;
  background:#1e1e1e; border:1px solid #333;
  display:flex; flex-direction:column;
  resize:both; overflow:hidden;
}

.titlebar {
  background:#111; padding:10px 15px; font-weight:bold;
  display:flex; justify-content:space-between; cursor:move;
  align-items: center;
}

.settings-toggle {
  cursor: pointer;
  font-size: 18px;
  transition: transform 0.2s;
  user-select: none;
}
.settings-toggle:hover { transform: rotate(45deg); color: #3a86ff; }

.tabs {
  background:#2d2d2d;
  display:flex; gap:5px;
  padding:0 5px;
  overflow-x:auto;
}

.tab {
  padding:5px 10px;
  background:#3c3c3c;
  border-radius:5px 5px 0 0;
  cursor:pointer;
  display:flex; align-items:center;
}

.tab.active { background:#3a86ff; }

.tab-name { pointer-events:auto; }
.delete { margin-left:6px; cursor:pointer; }

.main { display:flex; flex:1; position: relative; }

/* Settings Page View */
#settingsView {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: #1e1e1e;
  z-index: 10;
  display: none; 
  flex-direction: column;
  padding: 40px;
}

.settings-header { font-size: 20px; margin-bottom: 20px; color: #3a86ff; font-weight: bold; }

.input-container {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 450px;
}

.clean-input {
  flex: 1;
  background: #2d2d2d;
  border: 1px solid #444;
  padding: 10px;
  color: white;
  font-family: Consolas, monospace;
  outline: none;
  border-radius: 4px;
  transition: filter 0.3s ease;
}

/* Blur effect */
.blurred {
  filter: blur(5px);
  user-select: none;
  pointer-events: none;
}

.clean-input:focus { border-color: #3a86ff; filter: none !important; }

.toggle-btn {
  background: #3a86ff;
  border: none;
  color: white;
  padding: 10px 15px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  text-transform: uppercase;
  font-weight: bold;
}

.toggle-btn:hover { background: #2574f5; }

.left { flex:1; display:flex; flex-direction:column; }

#editorBox {
  flex:1;
  padding:10px;
  background:#1e1e1e;
  outline:none;
  overflow:auto;
  white-space:pre;
  font-size:14px;
  line-height:1.5;
}

.controls { display:flex; gap:8px; padding:10px; }

.controls button {
  background:#2d2d2d;
  border:none;
  color:white;
  padding:5px 10px;
  cursor:pointer;
}

.output {
  height:80px;
  overflow:auto;
  padding:10px;
  font-size:13px;
  background:#1e1e1e;
  border-top:1px solid #333;
  white-space:pre-wrap;
}

.sidebar {
  width:250px;
  background:#2d2d2d;
  padding:10px;
}

.search-bar input {
  width:100%;
  padding:5px;
  background:#1e1e1e;
  border:none;
  color:white;
}

</style>
</head>

<body>

<div id="executor">
  <div class="titlebar" id="dragBar">
    <span>AWP.GG</span>
    <span class="settings-toggle" id="settingsBtn">⚙</span>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="main">
    <div id="settingsView">
        <div class="settings-header">Device Script ID</div>
        <div class="input-container">
            <input type="text" id="scriptIdInput" class="clean-input" placeholder="Paste ID here...">
            <button class="toggle-btn" id="hideShowBtn">Show</button>
        </div>
        <small style="color:#888; margin-top:10px;">The ID is randomized and blurred for privacy after entry.</small>
    </div>

    <div class="left">
      <div id="editorBox" contenteditable="true">-- Welcome to AWP.GG!</div>

      <div class="controls">
        <button id="executeBtn">Execute</button>
        <button id="clearBtn">Clear</button>
        <button id="openBtn">Open</button>
        <button id="saveBtn">Save</button>
        <button id="newTabBtn">+ Tab</button>
      </div>

      <div id="output" class="output"></div>
    </div>

    <div class="sidebar">
      <div class="search-bar">
        <input placeholder="Search...">
      </div>
    </div>
  </div>
</div>

<script>

/* ---------- LOG SYSTEM ---------- */
const output = document.getElementById("output");

function log(msg){
  const t = new Date().toLocaleTimeString('en-US',{hour12:false});
  output.textContent += `[${t}] ${msg}\n`;
  output.scrollTop = output.scrollHeight;
}

/* ---------- SETTINGS & MASKING LOGIC ---------- */
const settingsBtn = document.getElementById("settingsBtn");
const settingsView = document.getElementById("settingsView");
const scriptIdInput = document.getElementById("scriptIdInput");
const hideShowBtn = document.getElementById("hideShowBtn");

let realId = "";
let isBlurred = true;
let isSettingsOpen = false;

function generateRandomString(length) {
    const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
    let result = '';
    for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

function applyPrivacy() {
    if (scriptIdInput.value.trim() === "") return;
    
    // Store the real value
    realId = scriptIdInput.value;
    
    // Replace with random string of same length (or fixed length)
    scriptIdInput.value = generateRandomString(realId.length > 0 ? realId.length : 12);
    
    // Apply blur
    scriptIdInput.classList.add("blurred");
    hideShowBtn.textContent = "Show";
    isBlurred = true;
    
    log(`Device Script ID set and masked successfully.`);
}

scriptIdInput.onkeydown = e => {
    if(e.key === "Enter") {
        applyPrivacy();
        scriptIdInput.blur();
    }
};

scriptIdInput.onblur = () => {
    // Only mask if we aren't already masked or if user just typed something new
    if (!scriptIdInput.classList.contains("blurred") && scriptIdInput.value !== "") {
        applyPrivacy();
    }
};

// When clicking the input, clear the mask to allow re-entry
scriptIdInput.onfocus = () => {
    if (isBlurred) {
        scriptIdInput.value = ""; 
        scriptIdInput.classList.remove("blurred");
    }
};

hideShowBtn.onclick = () => {
    isBlurred = !isBlurred;
    if (isBlurred) {
        scriptIdInput.classList.add("blurred");
        hideShowBtn.textContent = "Show";
    } else {
        scriptIdInput.classList.remove("blurred");
        hideShowBtn.textContent = "Hide";
    }
};

settingsBtn.onclick = () => {
    isSettingsOpen = !isSettingsOpen;
    settingsView.style.display = isSettingsOpen ? "flex" : "none";
    settingsBtn.textContent = isSettingsOpen ? "✕" : "⚙";
};

/* ---------- DRAG (Updated to ignore buttons) ---------- */
const dragBar = document.getElementById("dragBar");
const executor = document.getElementById("executor");
let drag=false, offX, offY;

dragBar.onmousedown = e=>{
  if(e.target.classList.contains('settings-toggle')) return;
  drag=true;
  offX = e.clientX - executor.offsetLeft;
  offY = e.clientY - executor.offsetTop;
};
document.onmousemove = e=>{
  if(drag){
    executor.style.left = (e.clientX - offX)+"px";
    executor.style.top = (e.clientY - offY)+"px";
  }
};
document.onmouseup = ()=>drag=false;

/* ---------- TABS ---------- */
const tabsContainer = document.getElementById("tabs");
const editorBox = document.getElementById("editorBox");
let tabsData = {};
let currentTab = null;
let tabCount = 0;

function getTabName(id){
  const el = tabsContainer.querySelector(`[data-tab="${id}"]`);
  return el?.querySelector(".tab-name").textContent || "script";
}

function createTab(name="Untitled"){
  tabCount++;
  const id="tab"+tabCount;
  tabsData[id]="";
  const tab=document.createElement("div");
  tab.className="tab";
  tab.dataset.tab=id;
  tab.innerHTML = `<span class="tab-name">${name}</span><span class="delete">✕</span>`;
  
  const del = tab.querySelector(".delete");
  tab.onclick = e=>{ if(e.target!==del) switchTab(id, tab); };
  del.onclick = e=>{ e.stopPropagation(); deleteTab(id, tab); };

  tabsContainer.appendChild(tab);
  switchTab(id, tab);
}

function switchTab(id, el){
  if(currentTab) tabsData[currentTab]=editorBox.innerText;
  currentTab=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  editorBox.innerText = tabsData[id] || "";
}

function deleteTab(id, el){
  if(Object.keys(tabsData).length<=1) return;
  delete tabsData[id];
  el.remove();
  const next = tabsContainer.querySelector(".tab");
  if(next) switchTab(next.dataset.tab,next);
}

/* ---------- BUTTONS ---------- */
document.getElementById("executeBtn").onclick = () => alert("Executed!");
document.getElementById("clearBtn").onclick = () => editorBox.innerText="";
document.getElementById("newTabBtn").onclick = () => createTab();
document.getElementById("saveBtn").onclick = () => log("Script Saved Locally");

/* ---------- INIT ---------- */
createTab("Main.lua");
log("Executor started");

</script>
</body>
</html>
