<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AWP.GG</title>

<!-- ACE EDITOR LIBRARY & THEMES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/theme-dracula.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/theme-tomorrow_night.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/theme-nord_dark.min.js"></script>

<!-- SORTABLE JS FOR DRAG TABS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

<style>
:root {
    --editor-opacity: 1;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Consolas, monospace; background:#1e1e1e; color:white; overflow:hidden; }

#executor {
  position:fixed; top:0; left:0;
  width:100vw; height:100vh;
  background:#1e1e1e; border:1px solid #333;
  display:flex; flex-direction:column;
  z-index: 1;
  /* Fluid Animations */
  transition: width 0.4s cubic-bezier(0.075, 0.82, 0.165, 1), 
              height 0.4s cubic-bezier(0.075, 0.82, 0.165, 1), 
              top 0.4s cubic-bezier(0.075, 0.82, 0.165, 1), 
              left 0.4s cubic-bezier(0.075, 0.82, 0.165, 1),
              opacity 0.3s;
}

#executor.dragging { transition: none !important; }

#executor.small-window {
    position: absolute;
    top: 50px; left: 50px;
    width: 950px; height: 550px;
    resize: both; overflow: hidden;
}

#executor.minimized {
    height: 38px !important;
    width: 300px !important;
    overflow: hidden;
}

.titlebar {
  background:#111; padding:10px 15px; font-weight:bold;
  display:flex; justify-content:space-between; 
  cursor: default; align-items: center; user-select: none;
}

.title-left { display: flex; align-items: center; gap: 15px; }

.window-controls { display: flex; gap: 15px; align-items: center; }

.win-btn { cursor: pointer; font-size: 16px; color: #888; transition: color 0.2s; }
.win-btn:hover { color: white; }
#closeBtn:hover { color: #ff4d4d; }

.settings-toggle { cursor: pointer; font-size: 18px; transition: transform 0.2s; user-select: none; }
.settings-toggle:hover { transform: rotate(45deg); color: #3a86ff; }

.tabs {
  background:#2d2d2d;
  display:flex; gap:2px;
  padding:0 5px;
  overflow-x:auto;
  min-height: 35px;
}

.tab {
  padding:8px 15px;
  background:#3c3c3c;
  border-radius:5px 5px 0 0;
  cursor:pointer;
  display:flex; align-items:center;
  font-size: 12px;
  white-space: nowrap;
  border-right: 1px solid #222;
}
.tab.active { background:#3a86ff; color: white; }
.tab:hover:not(.active) { background: #444; }
.delete { margin-left:8px; opacity: 0.5; }
.delete:hover { opacity: 1; color: #ff4d4d; }

/* Drag and Drop Ghost Style */
.sortable-ghost { opacity: 0.3; background: #3a86ff; }

.tab-rename-input {
    background: #1e1e1e; border: 1px solid #3a86ff;
    color: white; font-family: inherit; font-size: 12px;
    padding: 2px 5px; outline: none; width: 80px;
}

.main { display:flex; flex:1; position: relative; overflow: hidden; }

/* Custom Context Menu */
#contextMenu {
    position: fixed; background: #252525; border: 1px solid #444;
    padding: 5px 0; border-radius: 4px; z-index: 10000;
    display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}
.menu-item {
    padding: 8px 20px; font-size: 12px; color: #ccc; cursor: pointer;
}
.menu-item:hover { background: #3a86ff; color: white; }

/* Settings View Enhancements */
#settingsView {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #1e1e1e; z-index: 10; display: none;
  flex-direction: column; padding: 30px 40px; overflow-y: auto;
}

.settings-row {
    display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;
}

.settings-card {
    background: #252525; padding: 15px; border-radius: 5px;
    border: 1px solid #333; flex: 1; min-width: 250px;
}

.left { flex:1; display:flex; flex-direction:column; overflow: hidden; position: relative;}

/* Editor Box with Transparency Support */
#editorBox {
  flex:1; width: 100%; height: 100%; font-size:14px;
  opacity: var(--editor-opacity);
}

.controls { display:flex; gap:8px; padding:10px; background: #1e1e1e; }
.controls button {
  background:#2d2d2d; border:none; color:white;
  padding:5px 10px; cursor:pointer; transition: all 0.2s ease;
}

#executeBtn { background: #3a86ff; font-weight: bold; border-radius: 4px; }
#executeBtn:hover { background: #4a96ff; box-shadow: 0 0 8px rgba(58, 134, 255, 0.4); }

.output {
  height:100px; overflow:auto; padding:10px; font-size:13px;
  background:#1e1e1e; border-top:1px solid #333; white-space:pre-wrap;
}

/* Console Coloring */
.log-error { color: #ff5555; }
.log-success { color: #50fa7b; }
.log-warn { color: #f1fa8c; }

/* Sidebar & Script Hub */
.sidebar { width:250px; background:#111; display:flex; flex-direction:column; border-left: 1px solid #333; }
.sidebar-header { padding: 10px; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

.search-bar { padding: 10px; }
.search-bar input {
  width:100%; padding:8px; background:#1e1e1e; border:1px solid #333;
  color:white; border-radius: 4px; font-size: 12px; outline: none;
}

.script-list { flex: 1; overflow-y: auto; padding: 0 10px; }
.script-item {
    padding: 8px 10px; background: #222; margin-bottom: 5px;
    border-radius: 4px; font-size: 12px; cursor: pointer;
    transition: background 0.2s; border-left: 3px solid transparent;
}
.script-item:hover { background: #2d2d2d; border-left-color: #3a86ff; }

/* Notification System */
#notification-container {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    display: flex; flex-direction: column; gap: 10px; pointer-events: none;
}
.notif {
    background: #252525; color: white; padding: 12px 20px;
    border-radius: 6px; border-left: 4px solid #3a86ff;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 13px;
    min-width: 200px; transform: translateX(120%);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.notif.show { transform: translateX(0); }

/* Overlay UI */
#closeOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); z-index: 10000;
    display: none; align-items: center; justify-content: center;
}
.close-modal {
    background: #1e1e1e; border: 1px solid #333;
    padding: 30px; border-radius: 8px; text-align: center;
}
</style>
</head>

<body>

<div id="notification-container"></div>

<!-- Context Menu -->
<div id="contextMenu">
    <div class="menu-item" id="ctxDuplicate">Duplicate Tab</div>
    <div class="menu-item" id="ctxCloseOthers">Close Others</div>
    <div class="menu-item" id="ctxCloseAll">Close All</div>
    <div class="menu-item" id="ctxDownload">Reveal (Download)</div>
</div>

<div id="closeOverlay">
    <div class="close-modal">
        <h2>Close AWP.GG?</h2>
        <p>Any unsaved code changes will be lost.</p>
        <div class="modal-btns">
            <button class="action-btn primary-btn" id="confirmClose">Close Tab</button>
            <button class="action-btn" id="cancelClose">Cancel</button>
        </div>
    </div>
</div>

<div id="executor">
  <div class="titlebar" id="dragBar">
    <div class="title-left">
        <span>AWP.GG</span>
        <span class="settings-toggle" id="settingsBtn">⚙</span>
    </div>
    <div class="window-controls">
        <span class="win-btn" id="minBtn" title="Minimize">─</span>
        <span class="win-btn" id="sizeBtn" title="Small Window">❐</span>
        <span class="win-btn" id="closeBtn" title="Close">✕</span>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="main" id="mainWindow">
    <div id="settingsView">
        <div class="settings-header">Control Panel</div>
        <div class="settings-sub">Customize your environment and connectivity.</div>
        
        <div class="settings-row">
            <div class="settings-card">
                <div class="step-label">Cloud Linking</div>
                <div id="genDisplay" class="gen-display" style="margin-bottom:10px;">DEV-XXXXXXXXXXXXXX</div>
                <div class="gen-controls">
                    <button id="genBtn" class="action-btn primary-btn">New ID</button>
                    <button id="copyGenBtn" class="action-btn">Copy</button>
                </div>
                <div class="input-wrapper" style="margin-top:15px;">
                    <input type="text" id="scriptIdInput" class="clean-input" placeholder="Set ID here...">
                    <button id="visibilityToggle" class="toggle-btn" style="display:none;">Show</button>
                </div>
            </div>

            <div class="settings-card">
                <div class="step-label">Appearance</div>
                <div style="margin-bottom:10px;">
                    <label style="font-size:12px; color:#888;">Theme</label>
                    <select id="themeSelect" class="clean-input" style="padding:5px;">
                        <option value="ace/theme/monokai">Monokai (Default)</option>
                        <option value="ace/theme/dracula">Dracula</option>
                        <option value="ace/theme/tomorrow_night">Tomorrow Night</option>
                        <option value="ace/theme/nord_dark">Nord Dark</option>
                    </select>
                </div>
                <div style="margin-bottom:10px;">
                    <label style="font-size:12px; color:#888;">Font Family</label>
                    <select id="fontSelect" class="clean-input" style="padding:5px;">
                        <option value="Consolas, monospace">Consolas</option>
                        <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
                        <option value="'Fira Code', monospace">Fira Code</option>
                    </select>
                </div>
                <div>
                    <label style="font-size:12px; color:#888;">Opacity: <span id="opacityVal">100%</span></label>
                    <input type="range" id="opacitySlider" min="0.2" max="1" step="0.1" value="1" style="width:100%; accent-color:#3a86ff;">
                </div>
            </div>
        </div>

        <div class="settings-row">
            <div class="settings-card">
                <div class="step-label">Editor Settings</div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="font-size:12px; color:#888;">Font Size:</label>
                    <input type="number" id="fontSizeInput" class="clean-input" value="14" style="width:60px; padding:5px;">
                </div>
            </div>
            <div class="settings-card">
                <div class="step-label">Notifications</div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="font-size:12px; color:#888;">Duration (ms):</label>
                    <input type="number" id="notifDelayInput" class="clean-input" value="1500" style="width:80px; padding:5px;">
                </div>
            </div>
        </div>
    </div>

    <div class="left" id="editorDropZone">
      <div class="editor-container">
        <div id="editorBox">-- Welcome to AWP.GG Pro!</div>
      </div>

      <div class="controls">
        <button id="executeBtn">Execute (Ctrl+Enter)</button>
        <button id="clearBtn">Clear</button>
        <button id="openBtn">Open</button>
        <button id="saveBtn">Save (Ctrl+S)</button>
        <button id="newTabBtn">+ Tab (Ctrl+T)</button>
      </div>

      <div id="output" class="output"></div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">Script Hub</div>
      <div class="search-bar">
        <input type="text" id="hubSearch" placeholder="Search scripts...">
      </div>
      <div class="script-list" id="hubList">
          <!-- Hub items generated by JS -->
      </div>
    </div>
  </div>
</div>

<script>

/* ---------- SCRIPT HUB DATA ---------- */
const SCRIPT_HUB = [
    { name: "Infinite Yield", code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source"))()' },
    { name: "Dex Explorer", code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/infyiff/backup/main/dex.lua"))()' },
    { name: "Remote Spy", code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/78n/SimpleSpy/main/SimpleSpySource.lua"))()' },
    { name: "Unnamed ESP", code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/ic3w0lf22/Unnamed-ESP/master/source.lua"))()' },
    { name: "RTX Shader", code: '-- RTX Loading...\nloadstring(game:HttpGet("https://raw.githubusercontent.com/Miconia/RTX/main/source.lua"))()' }
];

/* ---------- NOTIFICATION SYSTEM ---------- */
const notifContainer = document.getElementById("notification-container");
const notifDelayInput = document.getElementById("notifDelayInput");

function notify(message) {
    const n = document.createElement("div");
    n.className = "notif";
    n.textContent = message;
    notifContainer.appendChild(n);
    setTimeout(() => n.classList.add("show"), 10);
    const delay = parseInt(notifDelayInput.value) || 1500;
    setTimeout(() => {
        n.classList.remove("show");
        setTimeout(() => n.remove(), 300);
    }, delay);
}

/* ---------- WINDOW CONTROLS ---------- */
const executor = document.getElementById("executor");
const sizeBtn = document.getElementById("sizeBtn");
const minBtn = document.getElementById("minBtn");
const closeBtn = document.getElementById("closeBtn");
const mainWindow = document.getElementById("mainWindow");
const tabsList = document.getElementById("tabs");
const closeOverlay = document.getElementById("closeOverlay");

let isSmall = false;
let isMinimized = false;

sizeBtn.onclick = () => {
    isSmall = !isSmall;
    if (isSmall) {
        executor.classList.add("small-window");
        sizeBtn.textContent = "▢";
    } else {
        executor.classList.remove("small-window");
        executor.style.top = "0"; executor.style.left = "0";
        sizeBtn.textContent = "❐";
    }
    setTimeout(() => editor.resize(), 450);
};

minBtn.onclick = () => {
    isMinimized = !isMinimized;
    executor.classList.toggle("minimized", isMinimized);
    editor.resize();
};

closeBtn.onclick = () => closeOverlay.style.display = "flex";
document.getElementById("cancelClose").onclick = () => closeOverlay.style.display = "none";
document.getElementById("confirmClose").onclick = () => window.close();

/* ---------- ACE EDITOR & CUSTOMIZATION ---------- */
const editor = ace.edit("editorBox");
editor.setTheme("ace/theme/monokai");
editor.session.setMode("ace/mode/lua");
editor.setOptions({
    fontFamily: "Consolas, monospace",
    fontSize: "14px",
    showPrintMargin: false,
    enableBasicAutocompletion: true,
    enableLiveAutocompletion: true,
});

// Settings Events
document.getElementById("themeSelect").onchange = (e) => editor.setTheme(e.target.value);
document.getElementById("fontSelect").onchange = (e) => editor.setOption("fontFamily", e.target.value);
document.getElementById("fontSizeInput").onchange = (e) => editor.setFontSize(parseInt(e.target.value));
document.getElementById("opacitySlider").oninput = (e) => {
    const val = e.target.value;
    document.documentElement.style.setProperty('--editor-opacity', val);
    document.getElementById("opacityVal").textContent = Math.round(val * 100) + "%";
};

/* ---------- LOG SYSTEM (WITH COLORING) ---------- */
const output = document.getElementById("output");
function log(msg){
  const t = new Date().toLocaleTimeString('en-US',{hour12:false});
  const div = document.createElement("div");
  div.textContent = `[${t}] ${msg}`;
  
  if(msg.toLowerCase().includes("error") || msg.toLowerCase().includes("failed")) div.className = "log-error";
  else if(msg.toLowerCase().includes("success") || msg.toLowerCase().includes("stored")) div.className = "log-success";
  else if(msg.toLowerCase().includes("warn")) div.className = "log-warn";

  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

/* ---------- KEYBOARD SHORTCUTS ---------- */
editor.commands.addCommand({
    name: "executeCode", bindKey: {win: "Ctrl-Enter", mac: "Command-Enter"},
    exec: () => document.getElementById("executeBtn").click()
});
editor.commands.addCommand({
    name: "saveCode", bindKey: {win: "Ctrl-S", mac: "Command-S"},
    exec: () => document.getElementById("saveBtn").click()
});
// Global shortcuts for tabs
window.addEventListener('keydown', e => {
    if(e.ctrlKey && e.key === 't') { e.preventDefault(); createTab(); }
    if(e.ctrlKey && e.key === 'w') { e.preventDefault(); deleteTab(currentTab, document.querySelector(`.tab.active`)); }
});

/* ---------- TAB SYSTEM (PRO FEATURES) ---------- */
const tabsContainer = document.getElementById("tabs");
let tabsData = {};
let currentTab = null;
let tabCount = 0;

// Drag and Drop Tabs
new Sortable(tabsContainer, { animation: 150, ghostClass: 'sortable-ghost' });

function createTab(name="Untitled", content=""){
  tabCount++;
  const id="tab"+tabCount;
  tabsData[id]=content;
  const tab=document.createElement("div");
  tab.className="tab";
  tab.dataset.tab=id;
  tab.innerHTML = `<span class="tab-name">${name}</span><span class="delete">✕</span>`;
  
  const nameSpan = tab.querySelector(".tab-name");
  const del = tab.querySelector(".delete");
  
  tab.onclick = e => { if(e.target!==del) switchTab(id, tab); };
  del.onclick = e => { e.stopPropagation(); deleteTab(id, tab); };
  
  // Renaming
  nameSpan.ondblclick = e => {
    const input = document.createElement("input");
    input.className = "tab-rename-input";
    input.value = nameSpan.textContent;
    nameSpan.replaceWith(input);
    input.focus();
    input.onblur = () => { nameSpan.textContent = input.value || "Untitled"; input.replaceWith(nameSpan); };
    input.onkeydown = ev => { if(ev.key === "Enter") input.blur(); };
  };

  // Context Menu Trigger
  tab.oncontextmenu = e => {
      e.preventDefault();
      showContextMenu(e.pageX, e.pageY, id, tab);
  };

  tabsContainer.appendChild(tab);
  switchTab(id, tab);
}

function switchTab(id, el){
  if(currentTab) tabsData[currentTab] = editor.getValue();
  currentTab=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  editor.setValue(tabsData[id] || "", -1);
}

function deleteTab(id, el){
  if(Object.keys(tabsData).length<=1) { notify("Cannot close last tab"); return; }
  delete tabsData[id];
  el.remove();
  const next = tabsContainer.querySelector(".tab");
  if(next) switchTab(next.dataset.tab,next);
}

/* ---------- CONTEXT MENU LOGIC ---------- */
const ctxMenu = document.getElementById("contextMenu");
let ctxTargetId = null;
let ctxTargetEl = null;

function showContextMenu(x, y, id, el) {
    ctxTargetId = id; ctxTargetEl = el;
    ctxMenu.style.display = "block";
    ctxMenu.style.left = x + "px";
    ctxMenu.style.top = y + "px";
}

window.onclick = () => ctxMenu.style.display = "none";

document.getElementById("ctxDuplicate").onclick = () => {
    const name = ctxTargetEl.querySelector(".tab-name").textContent;
    createTab(name + " (Copy)", tabsData[ctxTargetId]);
};

document.getElementById("ctxCloseOthers").onclick = () => {
    Object.keys(tabsData).forEach(id => {
        if(id !== ctxTargetId) {
            delete tabsData[id];
            document.querySelector(`[data-tab="${id}"]`).remove();
        }
    });
    switchTab(ctxTargetId, ctxTargetEl);
};

document.getElementById("ctxCloseAll").onclick = () => {
    Object.keys(tabsData).forEach(id => {
        delete tabsData[id];
        document.querySelector(`[data-tab="${id}"]`).remove();
    });
    createTab();
};

document.getElementById("ctxDownload").onclick = () => {
    const name = ctxTargetEl.querySelector(".tab-name").textContent + ".lua";
    const blob = new Blob([tabsData[ctxTargetId]]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = name; a.click();
};

/* ---------- FILE DROP SYSTEM ---------- */
const dropZone = document.getElementById("editorDropZone");
dropZone.ondragover = e => { e.preventDefault(); dropZone.style.background = "#252525"; };
dropZone.ondragleave = () => dropZone.style.background = "none";
dropZone.ondrop = e => {
    e.preventDefault();
    dropZone.style.background = "none";
    const file = e.dataTransfer.files[0];
    if(file && (file.name.endsWith(".lua") || file.name.endsWith(".txt"))) {
        const reader = new FileReader();
        reader.onload = ev => {
            createTab(file.name.replace(/\..+/, ""), ev.target.result);
            notify("File Dropped: " + file.name);
        };
        reader.readAsText(file);
    }
};

/* ---------- SCRIPT HUB LOGIC ---------- */
const hubList = document.getElementById("hubList");
const hubSearch = document.getElementById("hubSearch");

function renderHub(filter = "") {
    hubList.innerHTML = "";
    SCRIPT_HUB.forEach(item => {
        if(item.name.toLowerCase().includes(filter.toLowerCase())) {
            const div = document.createElement("div");
            div.className = "script-item";
            div.textContent = item.name;
            div.onclick = () => { createTab(item.name, item.code); notify("Loaded " + item.name); };
            hubList.appendChild(div);
        }
    });
}
hubSearch.oninput = (e) => renderHub(e.target.value);
renderHub();

/* ---------- ORIGINAL SETTINGS & API LOGIC ---------- */
const settingsBtn = document.getElementById("settingsBtn");
const settingsView = document.getElementById("settingsView");
const scriptIdInput = document.getElementById("scriptIdInput");
const visibilityToggle = document.getElementById("visibilityToggle");
const genBtn = document.getElementById("genBtn");
const copyGenBtn = document.getElementById("copyGenBtn");
const genDisplay = document.getElementById("genDisplay");

let realId = "";
let isSettingsOpen = false;
let isHidden = false;

function generateRandomString(length) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let result = "";
    for (let i = 0; i < length; i++) { result += chars.charAt(Math.floor(Math.random() * chars.length)); }
    return result;
}

genBtn.onclick = () => {
    realId = "DEV-" + generateRandomString(14);
    genDisplay.textContent = realId;
    log("Generated new ID: " + realId);
    notify("New ID Generated");
};

copyGenBtn.onclick = () => {
    if(genDisplay.textContent.includes("XXXX")) return;
    navigator.clipboard.writeText(genDisplay.textContent);
    notify("ID Copied");
};

settingsBtn.onclick = () => {
    isSettingsOpen = !isSettingsOpen;
    settingsView.style.display = isSettingsOpen ? "flex" : "none";
    settingsBtn.textContent = isSettingsOpen ? "✕" : "⚙";
};

scriptIdInput.onkeydown = e => { 
    if(e.key === "Enter") { 
        realId = scriptIdInput.value.trim(); 
        scriptIdInput.classList.add("blurred");
        visibilityToggle.style.display = "block";
        isHidden = true;
        notify("Script ID Locked");
        scriptIdInput.blur();
    } 
};

visibilityToggle.onclick = () => {
    if(isHidden) {
        scriptIdInput.value = realId;
        scriptIdInput.classList.remove("blurred");
        visibilityToggle.textContent = "Hide";
        isHidden = false;
    } else {
        scriptIdInput.classList.add("blurred");
        visibilityToggle.textContent = "Show";
        isHidden = true;
    }
};

/* ---------- API EXECUTION ---------- */
document.getElementById("executeBtn").onclick = async () => {
    const code = editor.getValue();
    const API_BASE = "https://3ea5995c-1090-4c51-9fe6-82555a6f5b96-00-309xspfsl4afn.spock.replit.dev"; 
    if (!realId) { log("Error: Script ID not set."); notify("Set ID in Settings!"); return; }
    
    log(`Pushing code to Cloud...`);
    try {
        const response = await fetch(`${API_BASE}/api/update-code`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: realId, script: code })
        });
        if (response.ok) { log("Success: Code stored."); notify("Executed!"); } 
        else { log(`Server Error: ${response.status}`); }
    } catch (err) { log("Connection Failed."); }
};

/* ---------- INITIALIZATION ---------- */
document.getElementById("clearBtn").onclick = () => editor.setValue("");
document.getElementById("newTabBtn").onclick = () => createTab();
document.getElementById("saveBtn").onclick = () => {
    const name = (document.querySelector(".tab.active .tab-name").textContent || "script") + ".lua";
    const blob = new Blob([editor.getValue()]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = name; a.click();
};

// Start
createTab("Main");
log("Executor Pro Loaded");

</script>
